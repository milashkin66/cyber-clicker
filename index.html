<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CYBER CORE</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{--bg:#0a0e1a;--panel:#121829;--line:#1f2a44;--card:#0e1424;
    --core:#00f0ff;--magenta:#ff2d95;--gold:#ffc43d;--text:#e8ecf6;--muted:#6c7794;--green:#33e08a;--gem:#5ad1ff;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;overflow:hidden;}
  body{background:radial-gradient(120% 70% at 50% -10%,#16203a 0%,var(--bg) 55%),var(--bg);
    color:var(--text);font-family:'Segoe UI',system-ui,Arial,sans-serif;user-select:none;}
  #app{display:flex;flex-direction:column;height:100dvh;}
  .head{padding:9px 16px 4px;flex-shrink:0;}
  .topbar{display:flex;justify-content:space-between;font-size:13px;font-weight:700;margin-bottom:3px;}
  .topbar .gem{color:var(--gem);} .topbar .sp{color:var(--green);}
  .balance{font-size:34px;font-weight:800;letter-spacing:-1px;color:var(--gold);text-shadow:0 0 22px rgba(255,196,61,.35);display:flex;align-items:center;justify-content:center;gap:6px;line-height:1.05;}
  .balance .coin{font-size:23px;}
  .sub{display:flex;justify-content:center;gap:12px;font-size:11px;margin-top:2px;}
  .sub .rate{color:var(--core);} .sub .lv{color:var(--magenta);}
  .lvlbar{height:5px;border-radius:3px;background:var(--line);overflow:hidden;margin:6px 2px 0;}
  .lvlbar-fill{height:100%;background:linear-gradient(90deg,var(--core),var(--magenta));transition:width .3s;}
  .views{flex:1;overflow-y:auto;overflow-x:hidden;padding:10px 13px 16px;}
  .view{display:none;} .view.active{display:block;}
  .stage{display:flex;flex-direction:column;align-items:center;padding-top:4px;}
  .core-wrap{position:relative;width:200px;height:200px;margin:14px 0 10px;}
  .core{position:absolute;inset:0;border-radius:50%;background:radial-gradient(circle at 38% 32%,#fff8,var(--core) 38%,#0066aa 78%,#022 100%);
    box-shadow:0 0 40px color-mix(in srgb,var(--core) 45%,transparent),inset 0 0 40px rgba(255,255,255,.25);
    cursor:pointer;border:none;display:flex;align-items:center;justify-content:center;transition:transform .08s,background .4s;animation:pulse 2.6s ease-in-out infinite;}
  .core:active{transform:scale(.93);} .core .glyph{font-size:78px;filter:drop-shadow(0 0 10px rgba(0,0,0,.4));}
  .core.golden{background:radial-gradient(circle at 38% 32%,#fff,#ffe680 38%,#ff9900 80%);box-shadow:0 0 60px rgba(255,196,61,.8);}
  .ring{position:absolute;inset:-12px;border-radius:50%;border:2px dashed color-mix(in srgb,var(--core) 35%,transparent);animation:spin 14s linear infinite;}
  .ring.r2{inset:-25px;border-color:rgba(255,45,149,.3);animation-duration:20s;animation-direction:reverse;}
  @keyframes spin{to{transform:rotate(360deg);}}
  @keyframes pulse{0%,100%{box-shadow:0 0 40px color-mix(in srgb,var(--core) 45%,transparent),inset 0 0 40px rgba(255,255,255,.25);}50%{box-shadow:0 0 70px color-mix(in srgb,var(--core) 70%,transparent),inset 0 0 50px rgba(255,255,255,.35);}}
  .float{position:absolute;font-weight:800;font-size:22px;color:var(--gold);text-shadow:0 0 12px rgba(255,196,61,.6);pointer-events:none;animation:fU .9s ease-out forwards;}
  @keyframes fU{0%{opacity:1;transform:translateY(0) scale(1);}100%{opacity:0;transform:translateY(-65px) scale(1.3);}}
  .actions{display:flex;gap:9px;margin:2px 0 11px;width:100%;max-width:340px;}
  .act{flex:1;border:1px solid var(--line);background:var(--card);color:var(--text);border-radius:12px;padding:8px;font-weight:700;font-size:11px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;}
  .act:active{transform:scale(.95);} .act .ai{font-size:18px;} .act.ready{border-color:var(--gold);box-shadow:0 0 14px rgba(255,196,61,.35);} .act:disabled{opacity:.5;}
  .energy{width:100%;max-width:340px;}
  .energy-row{display:flex;justify-content:space-between;font-size:12px;margin-bottom:5px;} .energy-val{color:var(--core);font-weight:700;}
  .bar{height:11px;border-radius:6px;background:var(--line);overflow:hidden;}
  .bar-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--magenta),var(--core));transition:width .2s;}
  .subtabs{display:flex;gap:6px;margin-bottom:11px;}
  .subtabs button{flex:1;background:var(--card);border:1px solid var(--line);color:var(--muted);border-radius:10px;padding:7px;font-size:12px;font-weight:700;cursor:pointer;}
  .subtabs button.on{color:var(--text);border-color:var(--core);background:#10243a;}
  .subview{display:none;} .subview.active{display:block;}
  .secttl{font-size:11px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin:2px 2px 9px;display:flex;justify-content:space-between;}
  .card{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:10px 11px;margin-bottom:8px;}
  .card.locked{opacity:.5;}
  .card .ico{font-size:24px;width:36px;text-align:center;flex-shrink:0;}
  .card .info{flex:1;min-width:0;} .card .name{font-weight:700;font-size:14px;} .card .desc{font-size:11px;color:var(--muted);margin-top:1px;} .card .inc{font-size:11px;color:var(--green);margin-top:1px;}
  .buy{border:none;border-radius:10px;padding:8px 11px;font-weight:800;font-size:13px;background:linear-gradient(135deg,var(--gold),#ff9900);color:#1a1208;cursor:pointer;white-space:nowrap;flex-shrink:0;}
  .buy:active{transform:scale(.94);} .buy.gem{background:linear-gradient(135deg,var(--gem),#2a8fd4);color:#022;} .buy.sp{background:linear-gradient(135deg,var(--green),#1fae66);color:#052;}
  .buy:disabled{background:#222b40;color:var(--muted);} .buy .lvl{display:block;font-size:9px;opacity:.7;font-weight:600;}
  .buy.own{background:#10243a;color:var(--core);border:1px solid var(--core);} .buy.sel{background:var(--core);color:#022;}
  .skingrid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;}
  .skingrid .card{flex-direction:column;text-align:center;gap:5px;padding:11px 8px;} .skingrid .ico{font-size:32px;width:auto;}
  .task{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:11px;margin-bottom:8px;}
  .task.done{border-color:var(--green);} .task .ico{font-size:21px;width:32px;text-align:center;}
  .task .info{flex:1;min-width:0;} .task .name{font-weight:700;font-size:13px;} .task .rw{font-size:11px;color:var(--gold);margin-top:1px;} .task .rw .g{color:var(--gem);}
  .task .st{font-size:11px;font-weight:800;padding:6px 10px;border-radius:9px;white-space:nowrap;}
  .task .st.wait{background:#222b40;color:var(--muted);} .task .st.claim{background:linear-gradient(135deg,var(--green),#1fae66);color:#062;cursor:pointer;}
  .pstat{display:flex;justify-content:space-between;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 13px;margin-bottom:7px;font-size:14px;}
  .pstat span:first-child{color:var(--muted);} .pstat b{color:var(--text);}
  .bigbtn{width:100%;border:none;border-radius:14px;padding:13px;font-weight:800;font-size:14px;margin-top:8px;cursor:pointer;}
  .bigbtn.pres{background:linear-gradient(135deg,var(--magenta),#7a1fff);color:#fff;} .bigbtn.all{background:linear-gradient(135deg,var(--green),#1fae66);color:#052;}
  .bigbtn:disabled{background:#222b40;color:var(--muted);}
  .phint{font-size:11px;color:var(--muted);text-align:center;margin-top:7px;line-height:1.45;}
  .nav{display:flex;background:var(--panel);border-top:1px solid var(--line);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom);}
  .nav button{flex:1;background:none;border:none;color:var(--muted);padding:8px 1px 10px;font-size:9px;font-weight:600;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;position:relative;}
  .nav button .ni{font-size:19px;} .nav button.on{color:var(--core);}
  .nav .badge{position:absolute;top:3px;right:50%;margin-right:-20px;background:var(--magenta);color:#fff;font-size:9px;font-weight:800;border-radius:8px;padding:0 5px;min-width:15px;}
  .toast{position:fixed;top:40%;left:50%;transform:translate(-50%,-50%);background:var(--card);border:1px solid var(--gold);border-radius:16px;padding:15px 22px;font-weight:800;font-size:15px;color:var(--gold);z-index:99;white-space:pre-line;box-shadow:0 0 40px rgba(255,196,61,.5);opacity:0;pointer-events:none;transition:opacity .25s;text-align:center;}
  .toast.on{opacity:1;}
  .loader{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;background:var(--bg);z-index:200;text-align:center;padding:20px;}
  .loader .sp{width:46px;height:46px;border:4px solid var(--line);border-top-color:var(--core);border-radius:50%;animation:spin 1s linear infinite;}
</style>
</head>
<body>
<div id="app">
  <div class="head">
    <div class="topbar"><span class="gem">💎 <span id="gems">0</span></span><span class="sp">🧬 <span id="sp">0</span></span></div>
    <div class="balance"><span class="coin">🪙</span><span id="balance">0</span></div>
    <div class="sub"><span class="rate" id="rate"></span><span class="lv" id="lvlTag">…</span></div>
    <div class="lvlbar"><div class="lvlbar-fill" id="lvlBar"></div></div>
  </div>
  <div class="views">
    <div class="view active" id="v-tap">
      <div class="stage">
        <div class="core-wrap" id="coreWrap"><div class="ring"></div><div class="ring r2"></div>
          <button class="core" id="core"><span class="glyph" id="glyph">⚛️</span></button></div>
        <div class="actions">
          <button class="act" id="boost"><span class="ai">🚀</span><span id="boostTxt">Овердрайв</span></button>
          <button class="act" id="refill"><span class="ai">⚡</span><span id="refillTxt">Заряд</span></button></div>
        <div class="energy"><div class="energy-row"><span>Энергия</span><span class="energy-val"><span id="energy">0</span> / <span id="maxEnergy">0</span></span></div>
          <div class="bar"><div class="bar-fill" id="energyBar"></div></div></div>
      </div>
    </div>
    <div class="view" id="v-miners"><div class="secttl"><span>Майнеры · пассив</span></div><div id="minerList"></div></div>
    <div class="view" id="v-up">
      <div class="subtabs"><button class="on" data-su="boosts">Бусты</button><button data-su="perks">Перки</button><button data-su="skins">Скины</button></div>
      <div class="subview active" id="su-boosts"><div id="boostList"></div></div>
      <div class="subview" id="su-perks"><div class="secttl"><span>Перки · 🧬 за уровни ядра</span></div><div id="perkList"></div></div>
      <div class="subview" id="su-skins"><div class="secttl"><span>Скины · 💎</span><span id="skinCount"></span></div><div class="skingrid" id="skinList"></div></div>
    </div>
    <div class="view" id="v-tasks">
      <div class="secttl"><span>Бонусы</span></div><div id="dailyBox"></div>
      <div class="secttl" style="margin-top:12px;"><span>Квесты</span><span id="questCount"></span></div>
      <button class="bigbtn all" id="claimAll">✅ Забрать все доступные</button>
      <div id="taskList" style="margin-top:9px;"></div>
    </div>
    <div class="view" id="v-profile">
      <div class="secttl"><span>Статистика</span></div><div id="profBox"></div>
      <button class="bigbtn pres" id="prestigeBtn">Перерождение</button><div class="phint" id="prestigeHint"></div>
    </div>
  </div>
  <div class="nav">
    <button class="on" data-v="tap"><span class="ni">🪙</span>Тап</button>
    <button data-v="miners"><span class="ni">⛏️</span>Майнеры</button>
    <button data-v="up"><span class="ni">🚀</span>Прокачка</button>
    <button data-v="tasks"><span class="ni">✅</span>Квесты<span class="badge" id="taskBadge" style="display:none">0</span></button>
    <button data-v="profile"><span class="ni">👤</span>Я</button>
  </div>
  <div class="toast" id="toast"></div>
</div>
<div class="loader" id="loader"><div class="sp"></div><div id="loaderTxt">Подключаюсь к серверу…</div></div>

<script>
  // ============ НАСТРОЙКА: сюда вставь адрес своего бэкенда ============
  const API = "https://ТВОЙ-БЭКЕНД.up.railway.app";   // ← URL сервера (Railway/Render)
  // ====================================================================
  const tg=window.Telegram&&window.Telegram.WebApp; if(tg){tg.ready();tg.expand();}
  function haptic(t){try{tg&&tg.HapticFeedback&&tg.HapticFeedback.impactOccurred(t);}catch(e){}}
  const $=id=>document.getElementById(id);
  const initData = (tg&&tg.initData)||"";
  let devId=null; try{devId=localStorage.getItem('cc_dev');}catch(e){}
  if(!devId){devId=(tg&&tg.initDataUnsafe&&tg.initDataUnsafe.user&&tg.initDataUnsafe.user.id)||('web'+Math.floor(Math.random()*1e9));try{localStorage.setItem('cc_dev',devId);}catch(e){}}

  let V=null, predScore=0, predEnergy=0, pending=0, lastSync=0;

  async function call(path, extra){
    try{const r=await fetch(API+path,{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify(Object.assign({initData,devId},extra||{}))});
      const j=await r.json(); if(j&&!j.error){apply(j);return j;}
      if(j&&j.error)showToast('Ошибка авторизации');return null;
    }catch(e){$('loaderTxt').innerText='Нет связи с сервером.\nПроверь адрес API в коде и что бэкенд запущен.';$('loader').style.display='flex';return null;}
  }

  function apply(v){V=v;predScore=v.score;predEnergy=v.energy;lastSync=Date.now();
    document.documentElement.style.setProperty('--core',v.color);
    $('glyph').innerText=v.glyph;$('core').classList.toggle('golden',v.golden);
    $('gems').innerText=fmt(v.gems);$('sp').innerText=v.sp;$('lvlTag').innerText=v.coreName;
    $('rate').innerText=v.income>0?'+'+v.incomeF+' /сек':'';
    $('maxEnergy').innerText=v.maxEnergy;$('lvlBar').style.width=v.lvlProg+'%';
    paintHeader();updateActions();renderActive();
    let n=v.quests.filter(q=>q.done).length+(v.dailyReady?1:0);
    const b=$('taskBadge'); if(n>0){b.style.display='';b.innerText=n;}else b.style.display='none';
  }
  function paintHeader(){$('balance').innerText=fmt(predScore);$('energy').innerText=Math.floor(predEnergy);
    $('energyBar').style.width=(V?predEnergy/V.maxEnergy*100:0)+'%';}

  function fmt(n){n=Math.floor(Number(n)||0);if(n<1000)return n;
    const s=['','K','M','B','T','Qa','Qi','Sx','Sp','Oc','No','Dc'];let i=Math.floor(Math.log10(n)/3);
    if(i>=s.length)return n.toExponential(2);return (n/Math.pow(1000,i)).toFixed(2).replace(/\.?0+$/,'')+s[i];}

  // ---- renderers ----
  function renderActive(){const v=document.querySelector('.view.active');if(!v||!V)return;const id=v.id;
    if(id==='v-miners')renderMiners();if(id==='v-up'){renderBoosts();renderPerks();renderSkins();}
    if(id==='v-tasks')renderTasks();if(id==='v-profile')renderProfile();}
  function renderMiners(){$('minerList').innerHTML=V.miners.map(m=>`<div class="card${m.locked?' locked':''}"><div class="ico">${m.ico}</div>
    <div class="info"><div class="name">${m.name}</div><div class="inc">${m.locked?'🔒 при '+m.unlock:'+'+m.inc+' /сек · ур.'}</div></div>
    ${m.locked?'':`<button class="buy" data-mid="${m.id}" ${m.can?'':'disabled'}>🪙 ${fmt(m.cost)}<span class="lvl">ур. ${m.lv}</span></button>`}</div>`).join('');
    bind('[data-mid]',el=>call('/api/buy_miner',{id:el.dataset.mid}).then(()=>haptic('medium')));}
  function renderBoosts(){$('boostList').innerHTML=V.boosts.map(b=>`<div class="card"><div class="ico">${b.ico}</div>
    <div class="info"><div class="name">${b.name}</div><div class="desc">${b.desc}</div></div>
    <button class="buy" data-bid="${b.id}" ${b.can?'':'disabled'}>🪙 ${fmt(b.cost)}<span class="lvl">ур. ${b.lv}</span></button></div>`).join('');
    bind('[data-bid]',el=>call('/api/buy_boost',{id:el.dataset.bid}).then(()=>haptic('medium')));}
  function renderPerks(){$('perkList').innerHTML=V.perks.map(p=>`<div class="card"><div class="ico">${p.ico}</div>
    <div class="info"><div class="name">${p.name} <span style="color:var(--muted);font-size:11px">${p.lv}/${p.max}</span></div><div class="desc">${p.desc}</div></div>
    <button class="buy sp" data-pid="${p.id}" ${p.can?'':'disabled'}>${p.lv>=p.max?'МАКС':'🧬 '+p.cost}</button></div>`).join('');
    bind('[data-pid]',el=>call('/api/buy_perk',{id:el.dataset.pid}).then(()=>haptic('medium')));}
  function renderSkins(){$('skinCount').innerText=V.skins.filter(s=>s.own).length+'/'+V.skins.length;
    $('skinList').innerHTML=V.skins.map(s=>{let btn;
      if(s.sel)btn='<button class="buy sel" disabled>Надет</button>';
      else if(s.own)btn=`<button class="buy own" data-skin="${s.id}">Надеть</button>`;
      else btn=`<button class="buy gem" data-skinbuy="${s.id}" ${s.can?'':'disabled'}>💎 ${s.cost}</button>`;
      return `<div class="card"><div class="ico">${s.g}</div><div class="info"><div class="name">${s.name}</div>
        <div class="desc">${s.bonus>0?'+'+s.bonus+'% доход':'базовый'}</div></div>${btn}</div>`;}).join('');
    bind('[data-skin]',el=>call('/api/set_skin',{id:el.dataset.skin}).then(()=>haptic('light')));
    bind('[data-skinbuy]',el=>call('/api/buy_skin',{id:el.dataset.skinbuy}).then(()=>{haptic('heavy');showToast('🎨 Скин куплен!');}));}
  function renderTasks(){$('questCount').innerText=V.questsDone+'/'+V.questsTotal;
    const ready=V.dailyReady;
    $('dailyBox').innerHTML=`<div class="task${ready?' done':''}"><div class="ico">🎁</div><div class="info"><div class="name">Ежедневный вход</div><div class="rw">Стрик: ${V.streak} дн.</div></div>
      ${ready?'<span class="st claim" id="dailyClaim">Забрать</span>':'<span class="st wait">⏳</span>'}</div>`;
    if(ready)$('dailyClaim').onclick=()=>call('/api/daily').then(()=>{haptic('heavy');showToast('🎁 Бонус получен!');});
    $('taskList').innerHTML=V.quests.map(q=>`<div class="task${q.done?' done':''}"><div class="ico">${q.done?'✅':'🎯'}</div>
      <div class="info"><div class="name">${q.name}</div><div class="rw">🪙 +${q.coins}${q.gems?' · <span class="g">💎 +'+q.gems+'</span>':''}</div></div>
      ${q.done?`<span class="st claim" data-q="${q.id}">Забрать</span>`:'<span class="st wait">…</span>'}</div>`).join('');
    bind('[data-q]',el=>call('/api/claim',{id:el.dataset.q}).then(()=>haptic('heavy')));}
  function renderProfile(){$('profBox').innerHTML=[
    ['Всего заработано',fmt(V.total)],['Сделано тапов',fmt(V.taps)],
    ['Уровень ядра',V.core+' / '+V.totalLevels+' · '+V.coreName],
    ['Доход/сек',V.incomeF],['Сила тапа',V.perTapF],['Шанс крита',V.crit+'%'],
    ['Кристаллы','💎 '+fmt(V.gems)],['Очки прокачки','🧬 '+V.sp],['Перерождений','♻️ '+V.prestige+' (+'+(V.prestige*10)+'%)'],
  ].map(r=>`<div class="pstat"><span>${r[0]}</span><b>${r[1]}</b></div>`).join('');
    const g=V.prestigeGain,btn=$('prestigeBtn');btn.disabled=g<1;
    btn.innerText=g<1?'Перерождение недоступно':'♻️ Переродиться → +'+g+'💎 престижа';
    $('prestigeHint').innerText='Сбрасывает баланс, майнеры, бусты И уровень ядра. Даёт престиж (+10% к доходу навсегда). Перки, скины и квесты сохраняются.';}
  function bind(sel,fn){document.querySelectorAll(sel).forEach(el=>el.onclick=()=>fn(el));}

  function updateActions(){if(!V)return;const bb=$('boost'),bt=$('boostTxt');bb.classList.remove('ready');
    if(V.boostLeft>0){bb.disabled=true;bt.innerText='x5 '+V.boostLeft+'с';}
    else if(V.boostCd>0){bb.disabled=true;bt.innerText=V.boostCd+'с';}else{bb.disabled=false;bb.classList.add('ready');bt.innerText='Овердрайв';}
    const rb=$('refill'),rt=$('refillTxt');rb.classList.remove('ready');
    if(V.refillCd>0){rb.disabled=true;rt.innerText=V.refillCd+'с';}else{rb.disabled=false;rb.classList.add('ready');rt.innerText='Заряд';}}

  function showToast(m){const t=$('toast');t.innerText=m;t.classList.add('on');clearTimeout(t._h);t._h=setTimeout(()=>t.classList.remove('on'),1600);}

  // ---- tap (оптимистично, сервер — источник правды) ----
  function tap(e){if(!V||predEnergy<1)return;predEnergy--;pending++;predScore+=V.perTap;paintHeader();haptic('light');
    const wrap=$('coreWrap'),f=document.createElement('div');f.className='float';f.innerText='+'+fmt(V.perTap);
    const r=wrap.getBoundingClientRect();const x=(e.touches?e.touches[0].clientX:e.clientX)-r.left,y=(e.touches?e.touches[0].clientY:e.clientY)-r.top;
    f.style.left=(x-10)+'px';f.style.top=(y-20)+'px';wrap.appendChild(f);setTimeout(()=>f.remove(),900);}
  const core=$('core');
  core.addEventListener('touchstart',e=>{e.preventDefault();tap(e);},{passive:false});
  core.addEventListener('mousedown',e=>{if(!('ontouchstart'in window))tap(e);});
  $('boost').onclick=()=>call('/api/boost').then(()=>{haptic('heavy');showToast('🚀 ОВЕРДРАЙВ x5!');});
  $('refill').onclick=()=>call('/api/refill').then(()=>{haptic('heavy');showToast('⚡ Заряд!');});
  $('prestigeBtn').onclick=()=>{if(confirm('Переродиться? Баланс, майнеры, бусты и уровень ядра сбросятся.'))call('/api/prestige').then(()=>{haptic('heavy');showToast('♻️ Перерождение!');});};
  $('claimAll').onclick=()=>call('/api/claim_all').then(()=>{haptic('heavy');showToast('✅ Награды собраны!');});

  // ---- nav ----
  document.querySelectorAll('.nav button').forEach(btn=>btn.onclick=()=>{
    document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('on'));
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    btn.classList.add('on');$('v-'+btn.dataset.v).classList.add('active');renderActive();haptic('light');});
  document.querySelectorAll('[data-su]').forEach(b=>b.onclick=()=>{document.querySelectorAll('[data-su]').forEach(x=>x.classList.remove('on'));
    document.querySelectorAll('#v-up .subview').forEach(s=>s.classList.remove('active'));b.classList.add('on');$('su-'+b.dataset.su).classList.add('active');haptic('light');});

  // ---- loops ----
  setInterval(()=>{ if(pending>0){const c=pending;pending=0;call('/api/tap',{count:c});} },700);
  setInterval(()=>{ if(V){predScore+=V.income;paintHeader();} },1000);
  setInterval(()=>{ if(pending===0)call('/api/state'); },8000);

  // ---- init ----
  (async()=>{const j=await call('/api/state');if(j){$('loader').style.display='none';}})();
</script>
</body>
</html>
