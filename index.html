<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CYBER CORE</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root{
    --bg:#0a0e1a; --panel:#121829; --line:#1f2a44; --card:#0e1424;
    --core:#00f0ff; --magenta:#ff2d95; --gold:#ffc43d;
    --text:#e8ecf6; --muted:#6c7794; --green:#33e08a;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;overflow:hidden;}
  body{background:radial-gradient(120% 70% at 50% -10%,#16203a 0%,var(--bg) 55%),var(--bg);
    color:var(--text);font-family:'Segoe UI',system-ui,Arial,sans-serif;user-select:none;}
  #app{display:flex;flex-direction:column;height:100dvh;}

  /* header */
  .head{padding:10px 18px 4px;text-align:center;flex-shrink:0;}
  .balance{font-size:38px;font-weight:800;letter-spacing:-1px;color:var(--gold);
    text-shadow:0 0 22px rgba(255,196,61,.35);display:flex;align-items:center;justify-content:center;gap:7px;line-height:1.05;}
  .balance .coin{font-size:26px;}
  .sub{display:flex;justify-content:center;gap:14px;font-size:11px;margin-top:3px;}
  .sub .rate{color:var(--core);} .sub .lv{color:var(--magenta);}
  .lvlbar{height:5px;border-radius:3px;background:var(--line);overflow:hidden;margin:7px 18px 0;}
  .lvlbar-fill{height:100%;background:linear-gradient(90deg,var(--core),var(--magenta));transition:width .3s;}

  /* views */
  .views{flex:1;overflow-y:auto;overflow-x:hidden;padding:10px 14px 16px;}
  .view{display:none;} .view.active{display:block;}

  /* tap view */
  .stage{display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;padding-top:6px;}
  .combo{height:22px;font-weight:800;font-size:17px;color:var(--magenta);text-shadow:0 0 14px rgba(255,45,149,.6);opacity:0;transition:opacity .2s;}
  .combo.on{opacity:1;}
  .core-wrap{position:relative;width:210px;height:210px;margin:4px 0 10px;}
  .core{position:absolute;inset:0;border-radius:50%;
    background:radial-gradient(circle at 38% 32%,#fff8,var(--core) 38%,#0066aa 78%,#022 100%);
    box-shadow:0 0 40px color-mix(in srgb,var(--core) 45%,transparent),inset 0 0 40px rgba(255,255,255,.25);
    cursor:pointer;border:none;display:flex;align-items:center;justify-content:center;
    transition:transform .08s,background .4s;animation:pulse 2.6s ease-in-out infinite;}
  .core:active{transform:scale(.93);}
  .core .glyph{font-size:82px;filter:drop-shadow(0 0 10px rgba(0,0,0,.4));}
  .ring{position:absolute;inset:-12px;border-radius:50%;border:2px dashed color-mix(in srgb,var(--core) 35%,transparent);animation:spin 14s linear infinite;}
  .ring.r2{inset:-26px;border-color:rgba(255,45,149,.3);animation-duration:20s;animation-direction:reverse;}
  @keyframes spin{to{transform:rotate(360deg);}}
  @keyframes pulse{0%,100%{box-shadow:0 0 40px color-mix(in srgb,var(--core) 45%,transparent),inset 0 0 40px rgba(255,255,255,.25);}50%{box-shadow:0 0 72px color-mix(in srgb,var(--core) 70%,transparent),inset 0 0 50px rgba(255,255,255,.35);}}
  .float{position:absolute;font-weight:800;font-size:22px;color:var(--gold);text-shadow:0 0 12px rgba(255,196,61,.6);pointer-events:none;animation:floatUp .9s ease-out forwards;}
  @keyframes floatUp{0%{opacity:1;transform:translateY(0) scale(1);}100%{opacity:0;transform:translateY(-65px) scale(1.3);}}
  .actions{display:flex;gap:10px;margin:4px 0 12px;}
  .act{flex:1;border:1px solid var(--line);background:var(--card);color:var(--text);border-radius:13px;
    padding:9px;font-weight:700;font-size:12px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:2px;transition:transform .1s;}
  .act:active{transform:scale(.95);} .act .ai{font-size:20px;}
  .act.ready{border-color:var(--gold);box-shadow:0 0 16px rgba(255,196,61,.35);}
  .act:disabled{opacity:.5;cursor:not-allowed;}
  .energy{width:100%;max-width:330px;}
  .energy-row{display:flex;justify-content:space-between;align-items:center;font-size:12px;margin-bottom:5px;}
  .energy-val{color:var(--core);font-weight:700;}
  .bar{height:11px;border-radius:6px;background:var(--line);overflow:hidden;}
  .bar-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--magenta),var(--core));transition:width .2s;}

  /* cards (miners/boosts) */
  .secttl{font-size:11px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin:4px 2px 9px;}
  .card{display:flex;align-items:center;gap:11px;background:var(--card);border:1px solid var(--line);
    border-radius:14px;padding:10px 12px;margin-bottom:8px;}
  .card.locked{opacity:.5;}
  .card .ico{font-size:25px;width:38px;text-align:center;flex-shrink:0;}
  .card .info{flex:1;min-width:0;}
  .card .name{font-weight:700;font-size:14px;}
  .card .desc{font-size:11px;color:var(--muted);margin-top:1px;}
  .card .inc{font-size:11px;color:var(--green);margin-top:1px;}
  .buy{border:none;border-radius:10px;padding:8px 12px;font-weight:800;font-size:13px;
    background:linear-gradient(135deg,var(--gold),#ff9900);color:#1a1208;cursor:pointer;white-space:nowrap;transition:transform .1s;flex-shrink:0;}
  .buy:active{transform:scale(.94);}
  .buy:disabled{background:#222b40;color:var(--muted);cursor:not-allowed;}
  .buy .lvl{display:block;font-size:9px;opacity:.7;font-weight:600;}

  /* tasks */
  .task{display:flex;align-items:center;gap:11px;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:11px 12px;margin-bottom:8px;}
  .task.done{border-color:var(--green);}
  .task .ico{font-size:22px;width:34px;text-align:center;}
  .task .info{flex:1;min-width:0;}
  .task .name{font-weight:700;font-size:13px;}
  .task .rw{font-size:11px;color:var(--gold);margin-top:1px;}
  .task .st{font-size:11px;font-weight:800;padding:6px 11px;border-radius:9px;white-space:nowrap;}
  .task .st.wait{background:#222b40;color:var(--muted);}
  .task .st.claim{background:linear-gradient(135deg,var(--green),#1fae66);color:#062;cursor:pointer;}
  .task .st.got{color:var(--green);}

  /* profile */
  .pstat{display:flex;justify-content:space-between;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:11px 14px;margin-bottom:8px;font-size:14px;}
  .pstat span:first-child{color:var(--muted);}
  .pstat b{color:var(--text);}
  .prestige{width:100%;border:none;border-radius:14px;padding:14px;font-weight:800;font-size:15px;margin-top:10px;
    background:linear-gradient(135deg,var(--magenta),#7a1fff);color:#fff;cursor:pointer;}
  .prestige:disabled{background:#222b40;color:var(--muted);cursor:not-allowed;}
  .phint{font-size:11px;color:var(--muted);text-align:center;margin-top:7px;line-height:1.4;}

  /* nav */
  .nav{display:flex;background:var(--panel);border-top:1px solid var(--line);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom);}
  .nav button{flex:1;background:none;border:none;color:var(--muted);padding:9px 2px 11px;font-size:10px;font-weight:600;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:color .15s;}
  .nav button .ni{font-size:21px;}
  .nav button.on{color:var(--core);}
  .nav button .badge{position:absolute;margin:-4px 0 0 16px;background:var(--magenta);color:#fff;font-size:9px;font-weight:800;border-radius:8px;padding:0 5px;min-width:15px;}

  .toast{position:fixed;top:42%;left:50%;transform:translate(-50%,-50%);background:var(--card);border:1px solid var(--gold);
    border-radius:16px;padding:16px 24px;font-weight:800;font-size:15px;color:var(--gold);z-index:99;white-space:pre-line;
    box-shadow:0 0 40px rgba(255,196,61,.5);opacity:0;pointer-events:none;transition:opacity .25s;text-align:center;}
  .toast.on{opacity:1;}
</style>
</head>
<body>
<div id="app">

  <div class="head">
    <div class="balance"><span class="coin">🪙</span><span id="balance">0</span></div>
    <div class="sub"><span class="rate" id="rate"></span><span class="lv" id="lvlTag">Ядро v1</span></div>
    <div class="lvlbar"><div class="lvlbar-fill" id="lvlBar"></div></div>
  </div>

  <div class="views">

    <!-- TAP -->
    <div class="view active" id="v-tap">
      <div class="stage">
        <div class="combo" id="combo"></div>
        <div class="core-wrap" id="coreWrap">
          <div class="ring"></div><div class="ring r2"></div>
          <button class="core" id="core"><span class="glyph" id="glyph">⚛️</span></button>
        </div>
        <div class="actions" style="width:100%;max-width:330px;">
          <button class="act" id="boost"><span class="ai">🚀</span><span id="boostTxt">Овердрайв</span></button>
          <button class="act" id="refill"><span class="ai">⚡</span><span id="refillTxt">Заряд</span></button>
        </div>
        <div class="energy">
          <div class="energy-row"><span>Энергия</span>
            <span class="energy-val"><span id="energy">100</span> / <span id="maxEnergy">100</span></span></div>
          <div class="bar"><div class="bar-fill" id="energyBar"></div></div>
        </div>
      </div>
    </div>

    <!-- MINERS -->
    <div class="view" id="v-miners">
      <div class="secttl">Майнеры · пассивный доход</div>
      <div id="minerList"></div>
    </div>

    <!-- BOOSTS -->
    <div class="view" id="v-boosts">
      <div class="secttl">Улучшения</div>
      <div id="boostList"></div>
    </div>

    <!-- TASKS -->
    <div class="view" id="v-tasks">
      <div class="secttl">Ежедневный бонус</div>
      <div id="dailyBox"></div>
      <div class="secttl" style="margin-top:14px;">Задания</div>
      <div id="taskList"></div>
    </div>

    <!-- PROFILE -->
    <div class="view" id="v-profile">
      <div class="secttl">Статистика</div>
      <div id="profBox"></div>
      <button class="prestige" id="prestigeBtn">Перезапуск</button>
      <div class="phint" id="prestigeHint"></div>
    </div>

  </div>

  <div class="nav">
    <button class="on" data-v="tap"><span class="ni">🪙</span>Тап</button>
    <button data-v="miners"><span class="ni">⛏️</span>Майнеры</button>
    <button data-v="boosts"><span class="ni">🚀</span>Бусты</button>
    <button data-v="tasks"><span class="ni">✅</span>Задания<span class="badge" id="taskBadge" style="display:none">0</span></button>
    <button data-v="profile"><span class="ni">👤</span>Профиль</button>
  </div>

  <div class="toast" id="toast"></div>
</div>

<script>
  const tg=window.Telegram&&window.Telegram.WebApp;
  if(tg){tg.ready();tg.expand();}
  function haptic(t){try{tg&&tg.HapticFeedback&&tg.HapticFeedback.impactOccurred(t);}catch(e){}}

  const mem={};
  const store={get(k){try{return localStorage.getItem(k);}catch(e){return mem[k]??null;}},
               set(k,v){try{localStorage.setItem(k,v);}catch(e){mem[k]=v;}}};

  // ---- Core evolution ----
  const LEVELS=[
    {n:'Ядро v1',g:'⚛️',c:'#00f0ff',need:0},
    {n:'Кварк-ядро',g:'🔮',c:'#a06bff',need:2000},
    {n:'Плазма',g:'💠',c:'#3aa0ff',need:10000},
    {n:'Реактор',g:'🌀',c:'#00ffaa',need:50000},
    {n:'Сверхновая',g:'⭐',c:'#ffc43d',need:250000},
    {n:'Пульсар',g:'🌟',c:'#ff7a00',need:1e6},
    {n:'Квазар',g:'💫',c:'#ff2d95',need:5e6},
    {n:'Чёрная дыра',g:'🕳️',c:'#8a5cff',need:25e6},
    {n:'Сингулярность',g:'🌌',c:'#00ffe0',need:1e8},
  ];

  // ---- Miners (passive) — мягкий рост цены 1.13 ----
  const MINERS=[
    {id:'chip', ico:'💾',name:'Дата-чип',     base:30,    inc:1,     unlock:0},
    {id:'rig',  ico:'🖥️',name:'Майнинг-риг',  base:250,   inc:6,     unlock:200},
    {id:'srv',  ico:'🗄️',name:'Сервер',        base:1500,  inc:30,    unlock:1500},
    {id:'sat',  ico:'🛰️',name:'Спутник',       base:9000,  inc:160,   unlock:9000},
    {id:'ai',   ico:'🤖',name:'ИИ-кластер',    base:50000, inc:850,   unlock:50000},
    {id:'nano', ico:'⚙️',name:'Нанофабрика',   base:300000,inc:5000,  unlock:300000},
    {id:'qnet', ico:'🌐',name:'Квантовая сеть',base:18e5,  inc:30000, unlock:18e5},
    {id:'dyson',ico:'☀️',name:'Дайсон-сфера',  base:12e6,  inc:180000,unlock:12e6},
  ];
  const MINER_GROWTH=1.13;

  // ---- Boost upgrades — рост 1.15 / множитель дешевле ----
  const BOOSTS=[
    {id:'tap', ico:'👆',name:'Сила тапа',   desc:'+1 к монетам за тап',     base:25,  growth:1.15},
    {id:'mult',ico:'✖️',name:'Множитель',   desc:'+10% ко всему доходу',     base:300, growth:1.25},
    {id:'cap', ico:'🔋',name:'Ёмкость',     desc:'+250 к макс. энергии',     base:120, growth:1.18},
    {id:'rgn', ico:'♻️',name:'Реген',       desc:'+1 к восстановл./сек',     base:200, growth:1.2},
  ];

  const TASKS=[
    {id:'t1',ico:'👆',name:'Сделай 50 тапов',     rw:150,  chk:S=>S.taps>=50},
    {id:'t2',ico:'🪙',name:'Заработай 1 000',     rw:300,  chk:S=>S.total>=1000},
    {id:'t3',ico:'⛏️',name:'Открой майнера',      rw:400,  chk:S=>Object.keys(S.miners).length>=1},
    {id:'t4',ico:'🔮',name:'Прокачай ядро до ур.2',rw:600, chk:S=>S.coreLevel>=1},
    {id:'t5',ico:'👆',name:'Сделай 500 тапов',    rw:1200, chk:S=>S.taps>=500},
    {id:'t6',ico:'⚙️',name:'Открой 4 майнера',    rw:5000, chk:S=>Object.keys(S.miners).length>=4},
    {id:'t7',ico:'📈',name:'Доход 200 / сек',     rw:8000, chk:S=>incomePerSec()>=200},
    {id:'t8',ico:'🌟',name:'Прокачай ядро до ур.5',rw:50000,chk:S=>S.coreLevel>=4},
  ];

  const S={
    score:0,total:0,taps:0,
    tapPower:1,energy:100,maxEnergy:100,energyRegen:1,
    coreLevel:0,
    miners:{},boosts:{tap:0,mult:0,cap:0,rgn:0},
    tasksClaimed:{},lastDaily:0,dailyStreak:0,
    prestige:0
  };

  let combo=0,lastTap=0,boostEnd=0,boostCd=0,refillCd=0;
  const BOOST_DUR=15000,BOOST_CD=180000,REFILL_CD=300000,DAY=86400000;

  (function load(){
    const raw=store.get('cybercore2');if(!raw)return;
    try{const d=JSON.parse(raw);Object.assign(S,d);
      if(d.t){const secs=Math.min((Date.now()-d.t)/1000,3*3600);const g=Math.floor(incomePerSec()*secs);S.score+=g;S.total+=g;}
    }catch(e){}
  })();
  function save(){store.set('cybercore2',JSON.stringify({...S,t:Date.now()}));}

  const $=id=>document.getElementById(id);
  function fmt(n){n=Math.floor(n);if(n<1000)return n;
    const s=['','K','M','B','T','Qa','Qi','Sx','Sp'];let i=Math.floor(Math.log10(n)/3);
    if(i>=s.length)return n.toExponential(2);
    return (n/Math.pow(1000,i)).toFixed(2).replace(/\.?0+$/,'')+s[i];}

  function globalMult(){return (1+S.boosts.mult*0.10)*(1+S.coreLevel*0.15)*(1+S.prestige*0.10);}
  function comboMult(){return 1+Math.min(combo,100)*0.01;}
  function boostMult(){return Date.now()<boostEnd?5:1;}
  function incomePerSec(){let b=0;for(const m of MINERS)b+=(S.miners[m.id]||0)*m.inc;return b*globalMult();}
  function perTap(){return S.tapPower*globalMult()*comboMult()*boostMult();}
  const minerCost=m=>Math.floor(m.base*Math.pow(MINER_GROWTH,S.miners[m.id]||0));
  const boostCost=b=>Math.floor(b.base*Math.pow(b.growth,S.boosts[b.id]));
  const prestigeGain=()=>Math.floor(Math.sqrt(S.total/5e5));

  function earn(a){S.score+=a;S.total+=a;
    while(S.coreLevel<LEVELS.length-1&&S.total>=LEVELS[S.coreLevel+1].need){
      S.coreLevel++;const L=LEVELS[S.coreLevel];
      document.documentElement.style.setProperty('--core',L.c);$('glyph').innerText=L.g;
      showToast('🆙 '+L.n+'!\n+15% к доходу');haptic('heavy');
    }}

  // ---- renderers ----
  function renderMiners(){
    $('minerList').innerHTML=MINERS.map(m=>{
      const lv=S.miners[m.id]||0, cost=minerCost(m);
      const locked=S.total<m.unlock && lv===0;
      const can=!locked&&S.score>=cost;
      return `<div class="card${locked?' locked':''}"><div class="ico">${m.ico}</div>
        <div class="info"><div class="name">${m.name}</div>
        <div class="inc">${locked?'🔒 откроется при '+fmt(m.unlock):'+'+fmt(m.inc*globalMult())+' /сек за ур.'}</div></div>
        ${locked?'':`<button class="buy" data-mid="${m.id}" ${can?'':'disabled'}>🪙 ${fmt(cost)}<span class="lvl">ур. ${lv}</span></button>`}</div>`;
    }).join('');
    $('minerList').querySelectorAll('.buy').forEach(b=>b.onclick=()=>buyMiner(b.dataset.mid));
  }
  function renderBoosts(){
    $('boostList').innerHTML=BOOSTS.map(b=>{
      const cost=boostCost(b),can=S.score>=cost;
      return `<div class="card"><div class="ico">${b.ico}</div>
        <div class="info"><div class="name">${b.name}</div><div class="desc">${b.desc}</div></div>
        <button class="buy" data-bid="${b.id}" ${can?'':'disabled'}>🪙 ${fmt(cost)}<span class="lvl">ур. ${S.boosts[b.id]}</span></button></div>`;
    }).join('');
    $('boostList').querySelectorAll('.buy').forEach(x=>x.onclick=()=>buyBoost(x.dataset.bid));
  }
  function renderTasks(){
    let avail=0;
    $('taskList').innerHTML=TASKS.map(t=>{
      const done=t.chk(S),claimed=S.tasksClaimed[t.id];
      let st;
      if(claimed) st='<span class="st got">✓ Готово</span>';
      else if(done){st=`<span class="st claim" data-tid="${t.id}">Забрать</span>`;avail++;}
      else st='<span class="st wait">…</span>';
      return `<div class="task${done?' done':''}"><div class="ico">${t.ico}</div>
        <div class="info"><div class="name">${t.name}</div><div class="rw">🪙 +${fmt(t.rw)}</div></div>${st}</div>`;
    }).join('');
    $('taskList').querySelectorAll('.claim').forEach(b=>b.onclick=()=>claimTask(b.dataset.tid));
    const bd=$('taskBadge');
    const daily=Date.now()-S.lastDaily>=DAY?1:0;
    if(avail+daily>0){bd.style.display='';bd.innerText=avail+daily;}else bd.style.display='none';
    // daily box
    const ready=Date.now()-S.lastDaily>=DAY;
    const h=Math.ceil((DAY-(Date.now()-S.lastDaily))/3600000);
    $('dailyBox').innerHTML=`<div class="task${ready?' done':''}"><div class="ico">🎁</div>
      <div class="info"><div class="name">Ежедневный вход</div><div class="rw">Стрик: ${S.dailyStreak} дн.</div></div>
      ${ready?'<span class="st claim" id="dailyClaim">Забрать</span>':'<span class="st wait">'+h+'ч</span>'}</div>`;
    if(ready)$('dailyClaim').onclick=claimDaily;
  }
  function renderProfile(){
    $('profBox').innerHTML=[
      ['Всего заработано',fmt(S.total)],
      ['Сделано тапов',fmt(S.taps)],
      ['Уровень ядра',(S.coreLevel+1)+' · '+LEVELS[S.coreLevel].n],
      ['Доход в секунду',fmt(incomePerSec())],
      ['Сила тапа',fmt(perTap())],
      ['Кристаллы престижа','💎 '+S.prestige+' (+'+(S.prestige*10)+'%)'],
    ].map(r=>`<div class="pstat"><span>${r[0]}</span><b>${r[1]}</b></div>`).join('');
    const g=prestigeGain(),btn=$('prestigeBtn');
    btn.disabled=g<1;
    btn.innerText=g<1?'Перезапуск недоступен':'Перезапуск → +'+g+' 💎';
    $('prestigeHint').innerText=g<1
      ?'Накопи больше, чтобы получить кристаллы. Они дают +10% к доходу навсегда и не сгорают при перезапуске.'
      :'Сбросит баланс, майнеры и бусты, но даст '+g+' кристаллов (+'+(g*10)+'% навсегда). Уровень ядра и задания сохранятся.';
  }

  function refresh(){
    $('balance').innerText=fmt(S.score);
    const inc=incomePerSec();
    $('rate').innerText=inc>0?'+'+fmt(inc)+' /сек':'';
    $('lvlTag').innerText=LEVELS[S.coreLevel].n;
    $('energy').innerText=Math.floor(S.energy);$('maxEnergy').innerText=S.maxEnergy;
    $('energyBar').style.width=(S.energy/S.maxEnergy*100)+'%';
    const L=LEVELS[S.coreLevel],nx=LEVELS[S.coreLevel+1];
    $('lvlBar').style.width=nx?Math.max(0,Math.min(100,(S.total-L.need)/(nx.need-L.need)*100))+'%':'100%';
    const c=$('combo');
    if(combo>4){c.classList.add('on');c.innerText='🔥 x'+comboMult().toFixed(2)+'  ('+combo+')';}else c.classList.remove('on');
    updateActions();
    // refresh visible buy buttons cheaply
    document.querySelectorAll('#minerList .buy').forEach(b=>b.disabled=S.score<minerCost(MINERS.find(m=>m.id===b.dataset.mid)));
    document.querySelectorAll('#boostList .buy').forEach(b=>b.disabled=S.score<boostCost(BOOSTS.find(x=>x.id===b.dataset.bid)));
  }

  function updateActions(){
    const now=Date.now(),bb=$('boost'),bt=$('boostTxt');
    bb.classList.remove('ready');
    if(now<boostEnd){bb.disabled=true;bt.innerText='x5 '+Math.ceil((boostEnd-now)/1000)+'с';}
    else if(now<boostCd){bb.disabled=true;bt.innerText=Math.ceil((boostCd-now)/1000)+'с';}
    else{bb.disabled=false;bb.classList.add('ready');bt.innerText='Овердрайв';}
    const rb=$('refill'),rt=$('refillTxt');rb.classList.remove('ready');
    if(now<refillCd){rb.disabled=true;rt.innerText=Math.ceil((refillCd-now)/1000)+'с';}
    else{rb.disabled=false;rb.classList.add('ready');rt.innerText='Заряд';}
  }

  // ---- actions ----
  function buyMiner(id){const m=MINERS.find(x=>x.id===id),cost=minerCost(m);if(S.score<cost)return;
    S.score-=cost;S.miners[id]=(S.miners[id]||0)+1;haptic('medium');save();renderMiners();refresh();}
  function buyBoost(id){const b=BOOSTS.find(x=>x.id===id),cost=boostCost(b);if(S.score<cost)return;
    S.score-=cost;S.boosts[id]++;
    if(id==='tap')S.tapPower+=1;if(id==='cap')S.maxEnergy+=250;if(id==='rgn')S.energyRegen+=1;
    haptic('medium');save();renderBoosts();refresh();}
  function claimTask(id){const t=TASKS.find(x=>x.id===id);if(!t.chk(S)||S.tasksClaimed[id])return;
    S.tasksClaimed[id]=true;earn(t.rw);haptic('heavy');showToast('✅ +'+fmt(t.rw));save();renderTasks();refresh();}
  function claimDaily(){if(Date.now()-S.lastDaily<DAY)return;
    S.dailyStreak=(Date.now()-S.lastDaily<2*DAY)?S.dailyStreak+1:1;S.lastDaily=Date.now();
    const rw=Math.max(500,Math.floor(incomePerSec()*600))*S.dailyStreak;
    earn(rw);haptic('heavy');showToast('🎁 +'+fmt(rw)+'\nСтрик: '+S.dailyStreak);save();renderTasks();refresh();}
  function fireBoost(){if(Date.now()<boostCd)return;boostEnd=Date.now()+BOOST_DUR;boostCd=Date.now()+BOOST_CD;
    haptic('heavy');showToast('🚀 ОВЕРДРАЙВ x5!');refresh();}
  function fireRefill(){if(Date.now()<refillCd)return;S.energy=S.maxEnergy;refillCd=Date.now()+REFILL_CD;
    haptic('heavy');showToast('⚡ Энергия восстановлена!');save();refresh();}
  function doPrestige(){const g=prestigeGain();if(g<1)return;
    if(!confirm('Перезапустить? Получишь '+g+' 💎 (+'+(g*10)+'% навсегда). Баланс и майнеры сбросятся.'))return;
    S.prestige+=g;S.score=0;S.miners={};S.boosts={tap:0,mult:0,cap:0,rgn:0};
    S.tapPower=1;S.maxEnergy=100;S.energy=100;S.energyRegen=1;
    haptic('heavy');showToast('💎 +'+g+' кристаллов!');save();renderMiners();renderBoosts();renderProfile();refresh();}

  function showToast(m){const t=$('toast');t.innerText=m;t.classList.add('on');clearTimeout(t._h);t._h=setTimeout(()=>t.classList.remove('on'),1600);}

  function tap(e){if(S.energy<1){haptic('rigid');return;}
    const now=Date.now();combo=(now-lastTap<800)?combo+1:0;lastTap=now;
    S.energy-=1;S.taps++;const gain=Math.round(perTap());earn(gain);haptic('light');
    const wrap=$('coreWrap'),f=document.createElement('div');f.className='float';f.innerText='+'+fmt(gain);
    const r=wrap.getBoundingClientRect();
    const x=(e.touches?e.touches[0].clientX:e.clientX)-r.left,y=(e.touches?e.touches[0].clientY:e.clientY)-r.top;
    f.style.left=(x-10)+'px';f.style.top=(y-20)+'px';wrap.appendChild(f);setTimeout(()=>f.remove(),900);refresh();}

  // ---- nav ----
  document.querySelectorAll('.nav button').forEach(btn=>{
    btn.onclick=()=>{
      document.querySelectorAll('.nav button').forEach(b=>b.classList.remove('on'));
      document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
      btn.classList.add('on');$('v-'+btn.dataset.v).classList.add('active');
      if(btn.dataset.v==='miners')renderMiners();
      if(btn.dataset.v==='boosts')renderBoosts();
      if(btn.dataset.v==='tasks')renderTasks();
      if(btn.dataset.v==='profile')renderProfile();
      haptic('light');
    };
  });

  const core=$('core');
  core.addEventListener('touchstart',e=>{e.preventDefault();tap(e);},{passive:false});
  core.addEventListener('mousedown',e=>{if(!('ontouchstart'in window))tap(e);});
  $('boost').onclick=fireBoost;$('refill').onclick=fireRefill;$('prestigeBtn').onclick=doPrestige;

  setInterval(()=>{
    const inc=incomePerSec();if(inc>0)earn(Math.floor(inc));
    if(S.energy<S.maxEnergy)S.energy=Math.min(S.maxEnergy,S.energy+S.energyRegen);
    if(combo>0&&Date.now()-lastTap>1000)combo=0;
    refresh();
    if($('v-tasks').classList.contains('active'))renderTasks();
  },1000);
  setInterval(save,5000);window.addEventListener('beforeunload',save);

  document.documentElement.style.setProperty('--core',LEVELS[S.coreLevel].c);
  $('glyph').innerText=LEVELS[S.coreLevel].g;
  renderMiners();renderBoosts();renderTasks();renderProfile();refresh();
</script>
</body>
</html>
